<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Press+Start+2P&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <header>
        <button class="btn again">again!</button>
        <p class="between">(Between 1 and 20)</p>
    </header>

    <main>
        <section class="title-position">
            <h1 class="game-name">Guess My Number!</h1>
            <div class="number">?</div>
        </section>

        <section class="bottom-section">
            <div class="left">
                <input type="number" class="guess">
                <button class="btn check">Check!</button>
            </div>

            <div class="right">
                <p class="message">Start guessing...</p>
                <p class="score">💯 Score :</p>
                <p class="highscore">🥇 Highscore:</p>
            </div>
        </section>
    </main>
    <footer></footer>
</body>

</html>
